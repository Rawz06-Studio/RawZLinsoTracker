name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    uses: RawZ06-Studio/.github/.github/workflows/node-ci-release.yml@main
    permissions:
      contents: write
    with:
      publishable: false       # application, pas de publish npm
    secrets: inherit

  sonar:
    needs: release
    uses: RawZ06-Studio/.github/.github/workflows/node-ci-sonar.yml@main
    with:
      node_version: '24'
    secrets: inherit

  docker:
    needs: release
    uses: RawZ06-Studio/.github/.github/workflows/docker-build-push.yml@main
    with:
      image_name: tracker-online
      dokploy_app_id: Hf_pYEjZ17XZPpRh0fgAX
    secrets: inherit
