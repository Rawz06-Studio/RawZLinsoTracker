<svg width="180" height="30" viewBox="0 0 180 30" xmlns="http://www.w3.org/2000/svg">
  <!-- Style commun pour les boutons (Octogones 30x30) -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.3"/>
    </filter>
    <!-- On définit le tracé de l'octogone une seule fois pour plus de clarté -->
    <path id="octo" d="M15 1.5 L24.5 5.5 L28.5 15 L24.5 24.5 L15 28.5 L5.5 24.5 L1.5 15 L5.5 5.5 Z" />
  </defs>

  <!-- 1. BOUTON A (Bleu) -->
  <g transform="translate(0,0)" filter="url(#shadow)">
    <use href="#octo" fill="#2c5cb8" stroke="#1a3a7a" stroke-width="1.2"/>
    <text x="15" y="20.5" font-family="Arial, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="white">A</text>
  </g>

  <!-- 2. BOUTON C-BAS (Jaune) -->
  <g transform="translate(30,0)" filter="url(#shadow)">
    <use href="#octo" fill="#eec000" stroke="#a68600" stroke-width="1.2"/>
    <path d="M15 21 L9 12 L21 12 Z" fill="#222"/>
  </g>

  <!-- 3. BOUTON C-GAUCHE (Jaune) -->
  <g transform="translate(60,0)" filter="url(#shadow)">
    <use href="#octo" fill="#eec000" stroke="#a68600" stroke-width="1.2"/>
    <path d="M9 15 L18 9 L18 21 Z" fill="#222"/>
  </g>

  <!-- 4. BOUTON C-DROITE (Jaune) -->
  <g transform="translate(90,0)" filter="url(#shadow)">
    <use href="#octo" fill="#eec000" stroke="#a68600" stroke-width="1.2"/>
    <path d="M21 15 L12 9 L12 21 Z" fill="#222"/>
  </g>

  <!-- 5. BOUTON C-HAUT (Jaune) -->
  <g transform="translate(120,0)" filter="url(#shadow)">
    <use href="#octo" fill="#eec000" stroke="#a68600" stroke-width="1.2"/>
    <path d="M15 9 L9 18 L21 18 Z" fill="#222"/>
  </g>

  <!-- 6. BOUTON A alternatif (Vert) -->
  <g transform="translate(150,0)" filter="url(#shadow)">
    <use href="#octo" fill="#008a45" stroke="#005a2d" stroke-width="1.2"/>
    <text x="15" y="20.5" font-family="Arial, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="white">A</text>
  </g>
</svg>
